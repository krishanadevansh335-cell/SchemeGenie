<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Switching Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        select { padding: 8px; font-size: 14px; margin-bottom: 20px; }
        .result { margin-top: 10px; padding: 10px; background: #f5f5f5; }
    </style>
</head>
<body>
    <h1>🌍 Multi-Language Translation Test</h1>
    
    <div class="test-section">
        <h2>Test Language Switching</h2>
        <select id="languageSelect">
            <option value="en">English</option>
            <option value="hi">हिन्दी (Hindi)</option>
            <option value="bn">বাংলা (Bengali)</option>
            <option value="ta">தமிழ் (Tamil)</option>
            <option value="te">తెలుగు (Telugu)</option>
            <option value="mr">मराठी (Marathi)</option>
            <option value="gu">ગુજરાતી (Gujarati)</option>
            <option value="kn">ಕನ್ನಡ (Kannada)</option>
            <option value="ml">മലയാളം (Malayalam)</option>
            <option value="or">ଓଡ଼ିଆ (Odia)</option>
            <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
            <option value="ur">اردو (Urdu)</option>
            <option value="ne">नेपाली (Nepali)</option>
            <option value="as">অসমীয়া (Assamese)</option>
            <option value="ma">मैथिली (Maithili)</option>
            <option value="fr">Français (French)</option>
            <option value="es">Español (Spanish)</option>
            <option value="de">Deutsch (German)</option>
            <option value="ru">Русский (Russian)</option>
            <option value="zh">中文 (Chinese)</option>
            <option value="ar">العربية (Arabic)</option>
        </select>
        
        <div id="testContent">
            <h3>Common Phrases:</h3>
            <div id="phrases"></div>
            
            <h3>Navigation:</h3>
            <div id="navigation"></div>
        </div>
    </div>

    <script>
        let currentTranslations = {};
        
        // Load translation file
        async function loadTranslation(lang) {
            try {
                const response = await fetch(`/locales/${lang}.json`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                currentTranslations = await response.json();
                updateContent();
                document.getElementById('languageSelect').value = lang;
                console.log(`Loaded ${lang} translations successfully`);
            } catch (error) {
                console.error('Error loading translation:', error);
                // Fallback to English
                if (lang !== 'en') {
                    loadTranslation('en');
                }
            }
        }
        
        // Update page content
        function updateContent() {
            const phrases = [
                'common.loading',
                'common.save',
                'common.cancel',
                'common.search',
                'common.success'
            ];
            
            const navigation = [
                'nav.home',
                'nav.schemes',
                'nav.applications',
                'nav.profile'
            ];
            
            let phrasesHtml = '<ul>';
            phrases.forEach(key => {
                const text = getNestedValue(currentTranslations, key);
                phrasesHtml += `<li><strong>${key}:</strong> ${text}</li>`;
            });
            phrasesHtml += '</ul>';
            
            let navHtml = '<ul>';
            navigation.forEach(key => {
                const text = getNestedValue(currentTranslations, key);
                navHtml += `<li><strong>${key}:</strong> ${text}</li>`;
            });
            navHtml += '</ul>';
            
            document.getElementById('phrases').innerHTML = phrasesHtml;
            document.getElementById('navigation').innerHTML = navHtml;
        }
        
        // Helper to get nested object value
        function getNestedValue(obj, path) {
            return path.split('.').reduce((o, k) => (o || {})[k], obj) || `[Missing: ${path}]`;
        }
        
        // Event listener
        document.getElementById('languageSelect').addEventListener('change', (e) => {
            loadTranslation(e.target.value);
        });
        
        // Load English by default
        loadTranslation('en');
    </script>
</body>
</html>
